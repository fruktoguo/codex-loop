<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">Codex Loop flow</title>
  <desc id="desc">Define a loop spec, let Codex work, validate in a Stop hook, and continue until all checks pass.</desc>

  <rect width="1200" height="280" rx="24" fill="#f8fafc"/>

  <rect x="40" y="70" width="230" height="140" rx="20" fill="#e0eaff" stroke="#1e6fff" stroke-width="3"/>
  <text x="155" y="114" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="700" fill="#0f172a">Write spec</text>
  <text x="155" y="152" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#334155">task / sections</text>
  <text x="155" y="180" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#334155">paths / commands</text>

  <rect x="340" y="70" width="230" height="140" rx="20" fill="#e8fff2" stroke="#0f9d58" stroke-width="3"/>
  <text x="455" y="114" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="700" fill="#0f172a">Codex works</text>
  <text x="455" y="152" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#334155">edit files / run tools</text>
  <text x="455" y="180" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#334155">prepare final reply</text>

  <rect x="640" y="70" width="230" height="140" rx="20" fill="#fff4e5" stroke="#f59e0b" stroke-width="3"/>
  <text x="755" y="114" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="700" fill="#0f172a">Stop hook</text>
  <text x="755" y="152" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#334155">token / sections</text>
  <text x="755" y="180" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#334155">commands / files</text>

  <rect x="940" y="70" width="220" height="140" rx="20" fill="#f1f5f9" stroke="#334155" stroke-width="3"/>
  <text x="1050" y="114" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="700" fill="#0f172a">Stop or loop</text>
  <text x="1050" y="152" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#334155">done -> stop</text>
  <text x="1050" y="180" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#334155">not done -> continue</text>

  <line x1="270" y1="140" x2="328" y2="140" stroke="#1e6fff" stroke-width="4" stroke-linecap="round"/>
  <line x1="570" y1="140" x2="628" y2="140" stroke="#0f9d58" stroke-width="4" stroke-linecap="round"/>
  <line x1="870" y1="140" x2="928" y2="140" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>

  <path d="M938 230 C886 264 777 270 689 246 C612 225 559 220 455 220 C355 220 289 227 238 248" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
  <path d="M238 248 L251 234" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
  <path d="M238 248 L257 253" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
  <text x="600" y="266" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#991b1b">If checks fail, Codex Loop continues the task.</text>
</svg>
